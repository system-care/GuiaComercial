# /etc/nginx/sites-available/guiacomercial
# ln -s /etc/nginx/sites-available/guiacomercial /etc/nginx/sites-enabled/

# ── Frontend público — guiacomercial.app ──────────────────────────────────────
server {
    listen 80;
    server_name guiacomercial.app www.guiacomercial.app;
    root /var/www/agendamento/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    index index.php;
    charset utf-8;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets com cache longo (Vite gera hashes)
    location ~* \.(css|js|woff2?|ttf|eot|svg|ico|png|jpg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60;
    }

    location ~ /\.(?!well-known).* { deny all; }

    access_log /var/log/nginx/guiacomercial.access.log;
    error_log  /var/log/nginx/guiacomercial.error.log;
}

